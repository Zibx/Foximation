var ctx = c1.getContext('2d');

console.log(t2-t1);

ctx.fillStyle = '#001';
 /* l.elts.forEach(el=> {

    if(el.next !== -1){

      l.elts.filter(a=>a.id === el.head).forEach(function(el2){

  c1.addEventListener('mousemove', function(e){
    requestAnimationFrame(function(){


      var x = e.offsetX;
      var y = e.offsetY;
      //console.log(x,y)
      var t1 = +new Date();
      var qs = l.query( x,y,40,40);
      var t2 = +new Date();
      var qs2 = []
      var r = rects;
      for(var i = 0; i < 10000; i++){
        var R = r[i];
        if(R[0]<=x && R[0]+5>=x && R[1]<=y && R[1]+5>=y)
          qs2.push(R);
      }
      var t3 = +new Date();

      console.log(t3-t2, '_')
      console.log(t2-t1,qs.length, qs2.length);

      ctx.strokeStyle = '#00BBCC'

      qs.forEach(r=>{

        ctx.strokeRect(r[0],r[1],r[2],r[3])
      })

      var t3 = +new Date();
      rects.forEach((rect,n) => {

        rect[0]+=(Math.random()*40-20)/10;
        rect[1]+=(Math.random()*40-20)/10;
        l.move(rect, rect[0], rect[1]);
      });
      var t4 = +new Date();
      console.log(t4-t3)
    });
  });

  draw();

  var removeOne = function(n){

    var r = n === void 0 ? Math.random.seeded()*rects.length|0 : n;
    var rect = rects[r];
    console.log('remove', rect[4]);
    l.remove(rect, rect[0]-rect[2]/2, rect[1]-rect[3]/2);
    rects.splice(r,1);
    console.log('removed', rect[4]);
    draw();
  }
  var qs = l.query( 150,400,0,0);

  var qs = l.query( 400,150,0,0);
