  #debug {
      position: fixed;

      pointer-events: none;
      z-index: 44;
  }
</style>
<div id="debug">

  <canvas id="debugC" width="100%" height="600"></canvas>
</div>
<script>
  var debugCtx = debugC.getContext('2d')
  d = {
    offset: new Point(400,300),
    scale: 20,
    clear: ()=>{
      debugCtx.clearRect(0,0,800,600);
    },
    line: (from, to, color, scale)=>{
      debugCtx.strokeStyle = color || 'crimson';
      debugCtx.beginPath();
      var p1 = from.mulClone(scale||d.scale).add(d.offset);
      debugCtx.moveTo(p1.x,p1.y);
      var p1 = to.mulClone(scale||d.scale).add(d.offset);

      debugCtx.lineTo(p1.x,p1.y);
      debugCtx.stroke();
    }
  }

  D.s = new Store();

  var lv = new Loopy({
    fps: 60,

    renderTo: D('#lines')[0],
    width: 800,
    height: 600,
    text: `RQ`/*`QUICK BROWN

DOGg
`*//*`ЪЖСЛОЕ

`*/,
    backgroundColor: '#182026',
    color: '#111133',
    //showGrid: true,
    lineHeight: 0.85,
    // debugLetters: true,
    //debugLines: true,
    textWidth: 7
  });

</script>
